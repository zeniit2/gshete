spring.application.name=base-lunar-api

# ============================================================
# Banco de dados H2 em modo FILE (os dados persistem apos reiniciar a aplicacao)
# O arquivo do banco e criado em ./database/base-lunar-db.mv.db
# ============================================================
spring.datasource.url=jdbc:h2:file:./database/base-lunar-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# Console web do H2 - acessivel em http://localhost:8080/h2-console
# JDBC URL no console: jdbc:h2:file:./database/base-lunar-db
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# Servidor
# ============================================================
server.port=8080
